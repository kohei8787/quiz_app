<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スクリーン表示</title>

  <!-- スクリーン表示画面専用のCSS -->
  <link rel="stylesheet" href="/css/screen.css" />
</head>
<body>
  <main class="container">
    <!-- 画面タイトル -->
    <h1>スクリーン表示</h1>

    <!-- 現在の状態を表示する場所 -->
    <p id="status">接続中...</p>

    <!-- 参加受付中に表示するエリア -->
    <div id="waitingSection" class="card">
      <h2 id="waitingTitle">参加受付中</h2>

      <!-- 参加済みチーム一覧 -->
      <ul id="teamList"></ul>
    </div>

    <!-- 問題表示用のエリア -->
    <div id="questionView" class="card" style="display: none;">
      <h2>現在の問題</h2>

      <!-- 現在の問題文 -->
      <p id="currentQuestionText">出題を待っています</p>

      <!-- 残り時間 -->
      <p id="timerText">残り時間: --秒</p>
    </div>

    <!-- 回答公開・正解発表用のエリア -->
    <div id="resultView" class="card" style="display: none;">
      <h2 id="resultTitle">回答公開</h2>
      <p id="correctAnswerText">正解: --</p>
      <div id="gaugeContainer" style="margin: 24px 0;"></div>
    </div>

    <!-- アンケート結果公開用のエリア（問題ごとに画像が切り替わる） -->
    <div id="surveyResultsView" class="card" style="display: none;">
      <h2>アンケート結果公開</h2>
      <p>グラフを表示します</p>
      <img id="surveyImage" src="/data/image/graph-placeholder.svg" alt="アンケート結果グラフ" style="max-width: 100%; height: auto;" />
    </div>

    <!-- 順位発表／イベント終了時の最終順位 -->
    <div id="rankingView" class="card" style="display: none;">
      <h2 id="rankingTitle">順位発表</h2>
      <ul id="rankingList"></ul>
    </div>
  </main>

  <!-- Socket.ioのクライアント用ライブラリ -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- スクリーン画面専用のJavaScript -->
  <script src="/js/screen.js?v=4"></script>
</body>
</html>
