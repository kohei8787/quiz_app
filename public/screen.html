<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スクリーン表示</title>

  <!-- スクリーン表示画面専用のCSS（プロジェクター向け大画面） -->
  <link rel="stylesheet" href="/css/screen.css?v=16" />
</head>
<body class="waiting-background">
  <div class="background-layer" aria-hidden="true">
    <img
      class="background-image background-image-waiting"
      src="/data/image/background/screen_bg_back.png"
      alt=""
    />
    <img
      class="background-image background-image-event"
      src="/data/image/background/screen_bg_side3.png"
      alt=""
    />
  </div>

  <main class="container">
    <!-- 現在の状態を表示する場所 -->
    <p id="status">接続中...</p>

    <!-- 参加受付中に表示するエリア -->
    <div id="waitingSection" class="card">
      <!-- 参加済みチーム一覧 -->
      <ul id="teamList"></ul>
    </div>

    <!-- 問題表示用のエリア（アンケートカード + 問題文カード） -->
    <div id="questionView" class="question-view" style="display: none;">
      <header class="question-header">
        <p id="questionTitle" class="question-title">出題待ち</p>
        <p class="timer-text">
          <span class="timer-icon" aria-hidden="true"></span>
          <span id="timerValue">--:--</span>
        </p>
      </header>

      <!-- アンケートの設問と選択肢 -->
      <section id="surveyCard" class="question-card survey-card" hidden>
        <p id="surveyQuestionText" class="survey-question-text"></p>
        <ul id="surveyOptionsList" class="survey-options"></ul>
      </section>

      <!-- 問題文（割合を問う） -->
      <section class="question-card prompt-card">
        <p id="currentQuestionText" class="prompt-question-text">出題を待っています</p>
      </section>
    </div>

    <!-- 回答公開・正解発表用のエリア -->
    <div id="resultView" class="card result-reveal-card" style="display: none;">
      <h2 id="resultTitle">回答公開</h2>
      <div class="result-reveal-body">
        <ul id="resultTeamListLeft" class="result-team-legend" aria-label="チーム一覧（左）"></ul>
        <div class="result-reveal-center">
          <div id="gaugeContainer" class="tacho-container"></div>
          <p id="correctAnswerText" class="result-correct-label" hidden>正解: --</p>
        </div>
        <ul id="resultTeamListRight" class="result-team-legend" aria-label="チーム一覧（右）"></ul>
      </div>
    </div>

    <!-- アンケート結果公開用のエリア（問題ごとに画像が切り替わる） -->
    <div id="surveyResultsView" class="card" style="display: none;">
      <img id="surveyImage" src="/data/image/graph-placeholder.svg" alt="アンケート結果グラフ" />
    </div>

    <!-- 順位発表（問題ごとの順位） -->
    <div id="rankingView" class="card" style="display: none;">
      <ul id="rankingList"></ul>
    </div>

    <!-- 結果発表（1〜3位セレモニー） -->
    <div id="resultsSection" class="results-section" style="display: none;">
      <img
        class="results-title-image"
        src="/data/image/components/quiz-result.png"
        alt="結果発表"
      />
      <div id="resultsView" class="card results-view">
        <div id="podium" class="podium" aria-live="polite"></div>
      </div>
    </div>

    <!-- イベント終了時のお礼画面 -->
    <div id="finishedView" class="card finished-view" style="display: none;">
      <h2 id="finishedTitle">ご参加ありがとうございました</h2>
      <p class="finished-message">本日のクイズは終了です</p>
      <h3 class="finished-ranking-heading">最終順位</h3>
      <ul id="finishedRankingList"></ul>
    </div>
  </main>

  <!-- Socket.ioのクライアント用ライブラリ -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- スクリーン画面専用のJavaScript -->
  <script src="/js/screen.js?v=28"></script>
</body>
</html>
