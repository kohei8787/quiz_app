<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スクリーン表示</title>

  <!-- スクリーン表示画面専用のCSS（プロジェクター向け大画面） -->
  <link rel="stylesheet" href="/css/screen.css" />
</head>
<body class="waiting-background">
  <div class="background-layer" aria-hidden="true">
    <img
      class="background-image background-image-waiting"
      src="/data/image/background/screen_bg_back.png"
      alt=""
    />
    <img
      class="background-image background-image-event"
      src="/data/image/background/screen_bg_side3.png"
      alt=""
    />
  </div>

  <main class="container">
    <!-- 現在の状態を表示する場所 -->
    <p id="status">接続中...</p>

    <!-- 参加受付中に表示するエリア -->
    <div id="waitingSection" class="card">
      <!-- 参加済みチーム一覧 -->
      <ul id="teamList"></ul>
    </div>

    <!-- 問題表示用のエリア -->
    <div id="questionView" class="card" style="display: none;">
      <h2>現在の問題</h2>

      <!-- 現在の問題文 -->
      <p id="currentQuestionText">出題を待っています</p>

      <!-- 残り時間（大きく表示） -->
      <p id="timerText">残り時間: --:--</p>
    </div>

    <!-- 回答公開・正解発表用のエリア -->
    <div id="resultView" class="card" style="display: none;">
      <h2 id="resultTitle">回答公開</h2>
      <p id="correctAnswerText">正解: --</p>
      <div id="gaugeContainer" style="margin: 24px 0;"></div>
    </div>

    <!-- アンケート結果公開用のエリア（問題ごとに画像が切り替わる） -->
    <div id="surveyResultsView" class="card" style="display: none;">
      <h2>アンケート結果公開</h2>
      <p class="survey-caption">グラフを表示します</p>
      <img id="surveyImage" src="/data/image/graph-placeholder.svg" alt="アンケート結果グラフ" />
    </div>

    <!-- 順位発表（問題ごとの順位） -->
    <div id="rankingView" class="card" style="display: none;">
      <h2 id="rankingTitle">順位発表</h2>
      <ul id="rankingList"></ul>
    </div>

    <!-- 結果発表（1〜3位セレモニー） -->
    <div id="resultsView" class="card results-view" style="display: none;">
      <h2>結果発表</h2>
      <p class="results-subtitle">上位表彰</p>
      <div id="podium" class="podium" aria-live="polite"></div>
    </div>

    <!-- イベント終了時のお礼画面 -->
    <div id="finishedView" class="card finished-view" style="display: none;">
      <h2 id="finishedTitle">ご参加ありがとうございました</h2>
      <p class="finished-message">本日のクイズは終了です</p>
      <h3 class="finished-ranking-heading">最終順位</h3>
      <ul id="finishedRankingList"></ul>
    </div>
  </main>

  <!-- Socket.ioのクライアント用ライブラリ -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- スクリーン画面専用のJavaScript -->
  <script src="/js/screen.js?v=17"></script>
</body>
</html>
