<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参加者画面</title>

  <!-- 参加者画面専用のCSS -->
  <link rel="stylesheet" href="/css/player.css" />
</head>
<body>
  <main class="container">
    <!-- 画面タイトル -->
    <h1>参加者画面</h1>

    <!-- 現在の状態を表示する場所 -->
    <p id="status">接続中...</p>

    <!-- 参加受付中に表示するエリア -->
    <div id="joinSection" class="card">
      <h2 id="joinSectionTitle">チーム参加</h2>

      <!-- 管理者が指定した参加コード（参加後は非表示） -->
      <input id="joinCodeInput" type="text" placeholder="参加コードを入力" autocomplete="off" />

      <!-- チーム名入力欄 -->
      <input id="teamNameInput" type="text" placeholder="チーム名を入力" />

      <!-- 座席番号入力欄（管理者だけが一覧で確認する） -->
      <input id="seatNumberInput" type="text" placeholder="座席番号を入力" />

      <!-- 未参加時の参加ボタン -->
      <button id="joinButton" type="button">参加</button>

      <!-- 参加後・編集前に表示。「チーム情報を変更」で編集モードへ -->
      <button id="editTeamButton" type="button" style="display: none;">チーム情報を変更</button>

      <!-- 編集モード時の決定・キャンセル -->
      <div id="teamEditActions" style="display: none;">
        <button id="confirmTeamButton" type="button">決定</button>
        <button id="cancelTeamButton" type="button">キャンセル</button>
      </div>

      <!-- 参加・更新結果メッセージ -->
      <p id="joinMessage"></p>
    </div>

    <!-- 問題・回答画面（出題中） -->
    <div id="questionView" class="question-phase" style="display: none;">
      <header class="player-header">
        <p id="questionProgress" class="question-progress">第--問 / 全--問</p>
        <div class="header-meta">
          <p id="scoreText" class="score-text">累計スコア -- pt</p>
          <p id="timerText" class="timer-text">
            <span class="timer-icon" aria-hidden="true"></span>
            <span id="timerValue">--秒</span>
          </p>
        </div>
      </header>

      <section class="card question-card">
        <div class="question-badge">
          <span class="badge-label">QUESTION</span>
          <span id="questionBadgeNum" class="badge-num">-- / --</span>
        </div>
        <p id="currentQuestionText" class="question-text">まだ問題は表示されていません</p>
        <p id="questionHint" class="question-hint">0~100%の範囲で予測してください</p>
      </section>

      <!-- 回答入力エリア -->
      <section id="answerArea" class="card answer-card" style="display: none;">
        <h2 class="answer-title">あなたの回答</h2>
        <div class="answer-stepper">
          <button id="answerDecButton" type="button" class="stepper-btn" aria-label="1減らす">
            <span aria-hidden="true">&#9660;</span>
          </button>
          <div class="answer-value-wrap">
            <input id="answerInput" type="number" min="0" max="100" value="50" inputmode="numeric" />
            <span class="answer-unit">%</span>
          </div>
          <button id="answerIncButton" type="button" class="stepper-btn" aria-label="1増やす">
            <span aria-hidden="true">&#9650;</span>
          </button>
        </div>
        <div class="answer-slider-wrap">
          <span class="answer-slider-scale" aria-hidden="true">0</span>
          <input
            id="answerSlider"
            class="answer-slider"
            type="range"
            min="0"
            max="100"
            value="50"
            aria-label="スライダーで回答を選択"
          />
          <span class="answer-slider-scale" aria-hidden="true">100</span>
        </div>
        <button id="submitAnswerButton" type="button" class="submit-answer-btn">回答を確定する</button>
        <p id="answerMessage" class="answer-message"></p>
      </section>
    </div>

    <!-- 回答公開・正解発表用のエリア -->
    <div id="resultView" class="card result-card" style="display: none;">
      <h2 id="resultTitle">回答公開</h2>
      <p id="correctAnswerText" class="result-correct-text">正解: --</p>
      <div id="revealedAnswersSection">
        <div id="gaugeContainer" class="tacho-container"></div>
      </div>
      <div id="myTeamResult" class="my-team-result" style="display: none;"></div>
    </div>

    <!-- アンケート結果公開用のエリア（問題ごとに画像が切り替わる） -->
    <div id="surveyResultsView" class="card" style="display: none;">
      <h2>アンケート結果公開</h2>
      <p>グラフを表示します</p>
      <img id="surveyImage" src="/data/image/graph-placeholder.svg" alt="アンケート結果グラフ" style="max-width: 100%; height: auto;" />
    </div>

    <!-- 順位発表用のエリア（アンケート結果公開の次／イベント終了時） -->
    <div id="rankingView" class="card" style="display: none;">
      <h2 id="rankingTitle">順位発表</h2>
      <p id="myRankText">あなたの順位: --</p>
      <ul id="rankingList"></ul>

      <!-- イベント終了時のみ：出題済み問題と自チームの回答 -->
      <section id="questionReviewSection" class="question-review" style="display: none;">
        <h3 class="question-review-title">出題された問題</h3>
        <ul id="questionReviewList"></ul>
      </section>
    </div>

    <!-- 結果発表（1〜3位セレモニー） -->
    <div id="resultsView" class="card results-view" style="display: none;">
      <h2>結果発表</h2>
      <p id="resultsSubtitle" class="results-subtitle">上位表彰</p>
      <div id="podium" class="podium" aria-live="polite"></div>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>

  <!-- 参加者画面専用のJavaScript -->
  <script src="/js/player.js?v=14"></script>
</body>
</html>
