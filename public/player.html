<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参加者画面</title>

  <!-- 参加者画面専用のCSS -->
  <link rel="stylesheet" href="/css/player.css" />
</head>
<body>
  <main class="container">
    <!-- 画面タイトル -->
    <h1>参加者画面</h1>

    <!-- 現在の状態を表示する場所 -->
    <p id="status">接続中...</p>

    <!-- 参加受付中に表示するエリア -->
    <div id="joinSection" class="card">
      <h2 id="joinSectionTitle">チーム参加</h2>

      <!-- 管理者が指定した参加コード（参加後は非表示） -->
      <input id="joinCodeInput" type="text" placeholder="参加コードを入力" autocomplete="off" />

      <!-- チーム名入力欄 -->
      <input id="teamNameInput" type="text" placeholder="チーム名を入力" />

      <!-- 座席番号入力欄（管理者だけが一覧で確認する） -->
      <input id="seatNumberInput" type="text" placeholder="座席番号を入力" />

      <!-- 未参加時の参加ボタン -->
      <button id="joinButton" type="button">参加</button>

      <!-- 参加後・編集前に表示。「チーム情報を変更」で編集モードへ -->
      <button id="editTeamButton" type="button" style="display: none;">チーム情報を変更</button>

      <!-- 編集モード時の決定・キャンセル -->
      <div id="teamEditActions" style="display: none;">
        <button id="confirmTeamButton" type="button">決定</button>
        <button id="cancelTeamButton" type="button">キャンセル</button>
      </div>

      <!-- 参加・更新結果メッセージ -->
      <p id="joinMessage"></p>
    </div>

    <!-- 問題表示用のエリア -->
    <div id="questionView" class="card" style="display: none;">
      <h2>現在の問題</h2>
      <p id="currentQuestionText">まだ問題は表示されていません</p>
      <p id="timerText">残り時間: --秒</p>
      <p id="scoreText">現在の得点: --点</p>

      <!-- 回答入力エリア -->
      <div id="answerArea" style="display: none;">
        <!-- 回答入力欄。0〜100の整数を想定 -->
        <input id="answerInput" type="number" min="0" max="100" placeholder="0〜100を入力" />

        <!-- スライダー入力 -->
        <label for="answerSlider">スライダーで選択</label>
        <input id="answerSlider" type="range" min="0" max="100" value="50" />
        <p>選択値: <span id="sliderValue">50</span>%</p>

        <!-- 回答送信ボタン -->
        <button id="submitAnswerButton">決定</button>

        <!-- 回答受付結果メッセージ -->
        <p id="answerMessage"></p>
      </div>
    </div>

    <!-- 回答公開・正解発表用のエリア -->
    <div id="resultView" class="card" style="display: none;">
      <h2 id="resultTitle">回答公開</h2>
      <p id="correctAnswerText">正解: --</p>
      <div id="revealedAnswersSection">
        <h3>全チームの回答</h3>
        <div id="gaugeContainer"></div>
      </div>
      <div id="myTeamResult" style="display: none; margin-top: 12px; text-align: left;"></div>
    </div>

    <!-- アンケート結果公開用のエリア（問題ごとに画像が切り替わる） -->
    <div id="surveyResultsView" class="card" style="display: none;">
      <h2>アンケート結果公開</h2>
      <p>グラフを表示します</p>
      <img id="surveyImage" src="/data/image/graph-placeholder.svg" alt="アンケート結果グラフ" style="max-width: 100%; height: auto;" />
    </div>

    <!-- 順位発表用のエリア（アンケート結果公開の次／イベント終了時） -->
    <div id="rankingView" class="card" style="display: none;">
      <h2 id="rankingTitle">順位発表</h2>
      <p id="myRankText">あなたの順位: --</p>
      <ul id="rankingList"></ul>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>

  <!-- 参加者画面専用のJavaScript -->
  <script src="/js/player.js?v=6"></script>
</body>
</html>
